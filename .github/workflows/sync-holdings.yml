name: Sync Longbridge Holdings

# 触发: 交易时段定时(cron 为 UTC) + 手动(Actions 页面 Run workflow)
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 1-7 * * 1-5'    # A股时段   (UTC, 约北京 09:00-15:30, 周一至周五)
    - cron: '*/30 13-21 * * 1-5'  # 美股时段   (UTC, 约北京 21:00-05:00, 周一至周五)

permissions:
  contents: write

concurrency:
  group: sync-holdings
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync holdings via Longbridge MCP
        # MCP token 通过 env 从 GitHub Secrets 注入; GitHub 会自动在日志里替换为 ***
        # 脚本仅用 Python 标准库, 无需 pip install
        env:
          LONGBRIDGE_MCP_TOKEN: ${{ secrets.LONGBRIDGE_MCP_TOKEN }}
          HOLDINGS_OWNER: '叶纸'
        run: python scripts/sync_holdings.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/holdings.json data/holdings_history.json)" ]; then
            git add data/holdings.json data/holdings_history.json
            git commit -m "chore: 自动更新持仓与盈亏路程"
            git push
            echo "已更新"
          else
            echo "无变化, 跳过提交"
          fi

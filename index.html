<style>
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:var(--font-body);color:var(--text);line-height:1.7;overflow-x:hidden;}
  body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;opacity:.35;}
  body::before{width:400px;height:400px;background:radial-gradient(circle,var(--pink-glow),transparent 70%);top:-80px;right:-100px;}
  body::after{width:500px;height:500px;background:radial-gradient(circle,var(--purple-glow),transparent 70%);bottom:-120px;left:-150px;}
  .star{position:fixed;pointer-events:none;z-index:0;}
  .star::before{content:'✦';}
  .s1{top:12%;left:8%;font-size:14px;color:var(--pink);animation:ds-twinkle 3s infinite;}
  .s2{top:25%;right:12%;font-size:10px;color:var(--purple);animation:ds-twinkle 2.5s infinite .5s;}
  .s3{top:60%;left:5%;font-size:12px;color:var(--neutral);animation:ds-twinkle 4s infinite 1s;}
  .s4{top:45%;right:6%;font-size:16px;color:var(--pink);animation:ds-twinkle 3.5s infinite 1.5s;}
  .s5{top:80%;right:15%;font-size:11px;color:var(--purple);animation:ds-twinkle 2.8s infinite .8s;}

  .nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
    backdrop-filter:var(--glass-blur);background:var(--glass-bg);}
  .nav-logo{font-weight:700;font-size:15px;color:var(--pink);text-decoration:none;display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-family:var(--font-body);}
  .nav-logo .turtle{font-size:22px;animation:ds-bounce 2s infinite;}
  .nav-links{display:flex;gap:8px;align-items:center;}
  .nav-links button.nl{font-size:13px;color:var(--text-3);background:none;border:none;font-family:var(--font-body);font-weight:500;padding:5px 10px;border-radius:999px;transition:all .2s;cursor:pointer;}
  .nav-links button.nl:hover,.nav-links button.nl:focus-visible{color:var(--pink);background:var(--pink-bg);outline:none;}

  .wrap{max-width:920px;margin:0 auto;padding:0 32px;position:relative;z-index:1;}
  .hero{display:flex;align-items:center;gap:32px;padding:48px 0 10px;}
  .hero-text{flex:1;}
  .hero-badge{display:inline-block;font-size:11px;font-weight:700;color:var(--purple);background:var(--purple-bg);
    padding:4px 14px;border-radius:999px;margin-bottom:16px;letter-spacing:.5px;border:1px solid rgba(139,92,246,.15);}
  .hero h1{font-size:32px;font-weight:900;letter-spacing:-.5px;margin:0 0 10px;
    background:var(--grad-brand);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    background-size:200% auto;animation:ds-shimmer 6s linear infinite;}
  .hero p{color:var(--text-2);font-size:14px;max-width:480px;margin:0;}
  .hero-mascot{flex:none;}

  .reveal{animation:ds-rise .6s var(--ease) both;}
  .pop{animation:ds-pop-in .7s var(--ease-spring) both;}
  @media (prefers-reduced-motion:reduce){ .reveal,.pop,.hero h1{animation:none;} }

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:28px 0 24px;}
  .stat{background:var(--surface);padding:18px 16px;text-align:center;border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:transform .2s,box-shadow .2s;}
  .stat:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
  .stat .n{font-family:var(--font-mono);font-size:22px;font-weight:900;}
  .stat .n.pink{color:var(--pink);} .stat .n.purple{color:var(--purple);} .stat .n.green{color:var(--bull-strong);}
  .stat .l{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-weight:700;}

  .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:24px;}
  .toolbar .grow{flex:1;min-width:220px;}
  .sortsel{padding:9px 14px;font-size:12px;font-weight:600;border:2px solid var(--border);border-radius:14px;background:var(--surface);color:var(--text);cursor:pointer;font-family:var(--font-body);}
  .sortsel:focus{outline:none;border-color:var(--purple);}
  .results{font-size:12px;color:var(--text-3);margin-bottom:14px;}

  .section-label{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--purple);padding-bottom:10px;
    border-bottom:2px dashed var(--border);display:flex;align-items:center;gap:8px;margin:8px 0 20px;}
  .section-label .ic{font-size:18px;}
  .section-label .c{font-family:var(--font-mono);background:var(--purple-bg);color:var(--purple);padding:2px 8px;border-radius:10px;font-size:10px;}
  .cards{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));margin-bottom:40px;}
  .cardwrap{animation:ds-rise .5s var(--ease) both;}
  .empty{text-align:center;padding:60px 20px;color:var(--text-3);background:var(--surface);border-radius:20px;border:2px dashed var(--border);}
  .empty .ic{font-size:42px;opacity:.5;margin-bottom:10px;}
  .footer{padding:24px 0 48px;font-size:12px;color:var(--text-3);border-top:2px dashed var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .footer a{color:var(--purple);text-decoration:none;font-weight:500;}
  .footer a:hover{text-decoration:underline;}
  @media (max-width:640px){ .stats{grid-template-columns:repeat(2,1fr);} .hero{flex-direction:column;text-align:center;} }
</style>

<!-- 配置 -->
<script>

  // 持仓默认值 (上线后可在页面上「✎ 编辑持仓」自由修改, 存本机浏览器)
  window.HOLDINGS = {
    owner: '叶纸', cash: 48000,
    positions: [
      { name:'华大智造', ticker:'688114.SH', shares:3000, cost:38.5,  price:42.10, prevClose:40.90 },
      { name:'Adobe',    ticker:'ADBE',      shares:40,   cost:402,   price:466,   prevClose:471 },
      { name:'华凯易佰', ticker:'300592.SZ', shares:8000, cost:12.60, price:13.93, prevClose:13.55 },
      { name:'Circle',   ticker:'CRCL',      shares:120,  cost:74,    price:81,    prevClose:79.40 },
      { name:'盛美上海', ticker:'688082.SH', shares:500,  cost:148,   price:166,   prevClose:170 },
    ],
  };
</script>

<script type="text/babel" data-presets="react,env">
const DS = window.DesignSystem_a138b7 || {};
const { ReportCard, Tabs, SearchInput, Button, Mascot } = DS;
const HoldingsTablePro = window.HoldingsTablePro;
(function(){
  var reg = { ReportCard:ReportCard, Tabs:Tabs, SearchInput:SearchInput, Button:Button, Mascot:Mascot, HoldingsTablePro:HoldingsTablePro };
  var miss = Object.keys(reg).filter(function(k){ return typeof reg[k] !== 'function'; });
  if (miss.length){
    document.getElementById('root').innerHTML = '<div style="max-width:680px;margin:40px auto;padding:24px;font-family:system-ui;color:#b00;border:2px dashed #f99;border-radius:12px"><h2>⚠️ 组件加载失败</h2><p>未能加载: <b>'+miss.join(', ')+'</b><br>请检查这些 JS 文件是否都正常加载。</p><pre style="white-space:pre-wrap;color:#666">'+JSON.stringify(DS.__errors||[],null,2)+'</pre></div>';
    throw new Error('DesignSystem load failed: '+miss.join(','));
  }
})();
const HOLDINGS = window.HOLDINGS;
const GH = (window.SITE && window.SITE.github) || '#';
const MARKETS = { us:'📈 美股 · US Equities', a:'🇨🇳 A股 · China A-Shares', hk:'🇭🇰 港股 · Hong Kong', pe:'🚀 一级市场 · Private Equity / VC' };

// reports.json 原始字段 → ReportCard 所需 props
const BADGE_MAP = { amber:'neutral', green:'bull', red:'bear', bull:'bull', bear:'bear', neutral:'neutral' };
const METRIC_MAP = { negative:'neg', positive:'pos', neg:'neg', pos:'pos', neutral:'neutral' };
function mapReport(r){
  return {
    slug: r.slug, ticker: r.ticker, sector: r.sector, name: r.name || r.name_cn,
    version: r.version, market: r.market, date: r.report_date, score: r.composite_score,
    tone: r.verdict_tone === 'bullish' ? 'bullish' : r.verdict_tone === 'bearish' ? 'bearish' : 'neutral',
    one: r.one_liner,
    badges: (r.badges||[]).map(b=>({ label:b.label, variant: BADGE_MAP[b.variant] || 'ghost' })),
    metrics: (r.metrics||[]).map(m=>({ label:m.label, value:m.value, tone: METRIC_MAP[m.tone] || 'neutral' })),
    href: `reports/${encodeURIComponent(r.slug)}/分析报告_dashboard.html`,
  };
}
function pickReports(json){ return (json && Array.isArray(json.reports)) ? json.reports.map(mapReport) : []; }

const fmtN = (n)=> (Number(n)||0).toLocaleString('zh-CN',{maximumFractionDigits:0});

// 盈亏路程: 账户自开户以来的总盈亏(含已平仓) 为主, 当前持仓浮亏为辅 + 迷你曲线
function PnlJourney({ performance, totals, history }){
  const p = performance || {};
  const t = totals || {};
  const acctPos = (Number(p.totalPnLCNY)||0) >= 0;
  const acctCol = acctPos ? 'var(--bull-strong)' : 'var(--bear-strong)';
  const openPos = (Number(t.pnlCNY)||0) >= 0;
  const openCol = openPos ? 'var(--bull-strong)' : 'var(--bear-strong)';
  const pts = (history||[]).filter(h=>h && typeof h.acctPnLPct==='number');
  let chart = null;
  if(pts.length){
    const W=640,H=110,pad=16;
    const vals = pts.map(h=>h.acctPnLPct).concat([0]);
    const mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
    const span=(mx-mn)||1;
    const X = (i)=> pad + (pts.length<=1 ? (W-2*pad)/2 : i*(W-2*pad)/(pts.length-1));
    const Y = (v)=> pad + (mx-v)/span*(H-2*pad);
    const line = pts.map((h,i)=>`${X(i).toFixed(1)},${Y(h.acctPnLPct).toFixed(1)}`).join(' ');
    chart = (
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="110" preserveAspectRatio="none" style={{display:'block',marginTop:4}}>
        <line x1={pad} x2={W-pad} y1={Y(0)} y2={Y(0)} stroke="var(--border-2)" strokeDasharray="4 4" strokeWidth="1"/>
        {pts.length>=2 && <polyline points={line} fill="none" stroke={acctCol} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
        {pts.map((h,i)=>(<circle key={i} cx={X(i)} cy={Y(h.acctPnLPct)} r={i===pts.length-1?4:2.5} fill={acctCol}/>))}
      </svg>
    );
  }
  return (
    <div className="reveal" style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,boxShadow:'var(--shadow-sm)',padding:'20px 24px',marginBottom:28}}>
      <div style={{display:'flex',alignItems:'baseline',gap:14,flexWrap:'wrap',marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:700,color:'var(--text-2)'}}>📈 盈亏路程 · 账户总览</span>
        {p.since && <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-3)'}}>自 {p.since} · 时间加权 {(Number(p.timeWeightedPct)||0)>=0?'+':''}{p.timeWeightedPct}% · 累计交易 {p.tradedCount} 只</span>}
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:12}}>
        <span style={{fontSize:12,color:'var(--text-3)'}}>账户累计盈亏</span>
        <span style={{fontFamily:'var(--font-mono)',fontSize:30,fontWeight:900,color:acctCol}}>{acctPos?'+':'−'}¥{fmtN(Math.abs(Number(p.totalPnLCNY)||0))}</span>
        <span style={{fontFamily:'var(--font-mono)',fontSize:18,fontWeight:700,color:acctCol}}>{acctPos?'+':'−'}{Math.abs(Number(p.totalPnLPct)||0).toFixed(2)}%</span>
      </div>
      {chart}
      <div style={{fontSize:12,color:'var(--text-3)',marginTop:8,borderTop:'1px dashed var(--border)',paddingTop:8}}>
        当前持仓浮动盈亏 <span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:openCol}}>{openPos?'+':'−'}¥{fmtN(Math.abs(Number(t.pnlCNY)||0))} ({openPos?'+':'−'}{Math.abs(Number(t.pnlPct)||0).toFixed(2)}%)</span> · 总成本 ¥{fmtN(t.costCNY)} → 现值 ¥{fmtN(t.grossMvCNY!=null?t.grossMvCNY:t.valueCNY)}
      </div>
    </div>
  );
}

function App(){
  const [reports,setReports] = React.useState(()=> window.REPORTS_RAW ? pickReports(window.REPORTS_RAW) : []);
  const [loading,setLoading] = React.useState(true);
  const [holdings,setHoldings] = React.useState(null);   // 真实持仓(来自 data/holdings.json); null = 用内置可编辑示例
  const [history,setHistory] = React.useState(null);     // 盈亏路程历史 (data/holdings_history.json)
  const [q,setQ] = React.useState('');
  const [market,setMarket] = React.useState('all');
  const [sort,setSort] = React.useState('score-desc');

  // 线上实时读取 data/reports.json (本地 file:// 失败则用兜底)
  React.useEffect(()=>{
    fetch('data/reports.json').then(r=>r.json()).then(j=>{ setReports(pickReports(j)); setLoading(false); })
      .catch(()=>{ setLoading(false); });
    // 真实持仓: GitHub Action 从长桥同步生成 data/holdings.json; 取不到则保留内置可编辑示例
    fetch('data/holdings.json').then(r=>r.ok?r.json():null).then(j=>{ if(j && Array.isArray(j.positions)) setHoldings(j); }).catch(()=>{});
    fetch('data/holdings_history.json').then(r=>r.ok?r.json():null).then(j=>{ if(Array.isArray(j)) setHistory(j); }).catch(()=>{});
  },[]);

  const counts = React.useMemo(()=>{ const c={}; reports.forEach(r=>c[r.market]=(c[r.market]||0)+1); return c; },[reports]);

  let list = reports.filter(r=>{
    if(market!=='all' && r.market!==market) return false;
    if(q.trim()){ const hay=[r.ticker,r.name,r.sector,r.one].join(' ').toLowerCase(); if(!hay.includes(q.trim().toLowerCase())) return false; }
    return true;
  });
  list = [...list].sort((a,b)=>{
    if(sort==='score-desc') return b.score-a.score;
    if(sort==='score-asc') return a.score-b.score;
    if(sort==='date-desc') return (b.date||'').localeCompare(a.date||'');
    return (a.date||'').localeCompare(b.date||'');
  });

  const byMarket={}; list.forEach(r=>(byMarket[r.market]=byMarket[r.market]||[]).push(r));
  const total=reports.length;
  const bullish=reports.filter(r=>r.tone==='bullish').length;
  const latest=reports.reduce((m,r)=>(r.date>m?r.date:m),'').slice(5).replace('-','/');

  const tabItems=[{value:'all',label:'全部'}];
  ['us','a','hk','pe'].forEach(m=>{ if(counts[m]) tabItems.push({value:m,label:MARKETS[m].slice(0,5),count:counts[m]}); });

  return (
    <React.Fragment>
      <nav className="nav">
        <button className="nav-logo" onClick={()=>{setMarket('all');setQ('');window.scrollTo({top:0,behavior:'smooth'});}}>
          <span className="turtle">🐢</span> 叶纸的投资报告
        </button>
        <div className="nav-links">
          {counts.us && <button className="nl" onClick={()=>setMarket('us')}>📈 美股</button>}
          {counts.a && <button className="nl" onClick={()=>setMarket('a')}>🇨🇳 A股</button>}
          {counts.pe && <button className="nl" onClick={()=>setMarket('pe')}>🚀 一级市场</button>}
          <Button as="a" variant="ghost" size="sm" href={GH} target="_blank" rel="noopener">GitHub</Button>
        </div>
      </nav>

      <div className="wrap">
        <div className="hero">
          <div className="hero-text reveal">
            <span className="hero-badge">✦ AI 投资分析 v4.6 ✦</span>
            <h1>叶纸的投资分析报告</h1>
            <p>基于 11 大师框架的定量审计 + DCF 概率加权估值 + 多角色投资哲学分歧。覆盖美股 / A 股 / 港股 / 一级市场。报告由 company-analysis skill 自动生成。</p>
          </div>
          <div className="hero-mascot pop" style={{animationDelay:'.15s'}}>
            <Mascot src="assets/mascot-placeholder.jpg" name="叶纸" bubbleSide="left"
              quotes={['我是叶纸,慢即是稳 🐢','看 OCF,别只看利润表~','估值透支了哦,冷静一下','DCF 概率加权,稳一点!','戳我换台词!']} />
          </div>
        </div>

        <div className="stats reveal" style={{animationDelay:'.28s'}}>
          <div className="stat"><div className="n pink">{total}</div><div className="l">分析报告</div></div>
          <div className="stat"><div className="n purple">{Object.keys(counts).length}</div><div className="l">覆盖板块</div></div>
          <div className="stat"><div className="n green">{bullish}</div><div className="l">看好标的</div></div>
          <div className="stat"><div className="n">{latest||'—'}</div><div className="l">最新更新</div></div>
        </div>

        <div className="reveal" style={{animationDelay:'.4s',marginBottom:'28px'}}>
          {holdings ? (
            <HoldingsTablePro key="hold-real" owner={holdings.owner||HOLDINGS.owner} cash={holdings.cashCNY||0}
              positions={holdings.positions} fx={holdings.fx||{CNY:1}} readOnly
              updatedLabel={holdings.last_updated ? ('更新于 '+String(holdings.last_updated).replace('T',' ').replace('Z',' UTC')+' · 来自长桥') : '来自长桥'}
              note="实时持仓 · 来自长桥 · 总资产=净资产(已扣融资), 仓位>100%即融资杠杆 · 金额按当日汇率折算¥ · 不构成投资建议" />
          ) : (
            <HoldingsTablePro key="hold-seed" owner={HOLDINGS.owner} cash={HOLDINGS.cash} positions={HOLDINGS.positions}
              note="手动维护持仓 · 点「✎ 编辑持仓」即可改 / 增 / 删, 改动自动保存到本机浏览器 · 不构成投资建议" />
          )}
        </div>

        {holdings && <PnlJourney performance={holdings.performance} totals={holdings.totals} history={history} />}

        <div className="toolbar">
          <div className="grow"><SearchInput placeholder="搜索 ticker / 公司名 / 业务描述..." value={q} onChange={e=>setQ(e.target.value)} /></div>
          <Tabs value={market} onChange={setMarket} items={tabItems}/>
          <select className="sortsel" value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="score-desc">⭐ 评分高→低</option>
            <option value="score-asc">⭐ 评分低→高</option>
            <option value="date-desc">🕐 最新披露</option>
            <option value="date-asc">🕐 最早披露</option>
          </select>
        </div>
        <div className="results">{loading && total===0 ? '加载中...' : (list.length===total?`共 ${total} 份分析报告`:`当前显示 ${list.length} / ${total} 份报告`)}</div>

        {total===0 ? (
          <div className="empty"><div className="ic">🐢</div><div>{loading?'正在读取报告数据...':'暂无报告数据 (请确认 data/reports.json 可访问)'}</div></div>
        ) : list.length===0 ? (
          <div className="empty"><div className="ic">🔍</div><div>没有匹配的报告</div></div>
        ) : Object.keys(MARKETS).filter(m=>byMarket[m]&&byMarket[m].length).map(m=>(
          <div key={m}>
            <div className="section-label"><span className="ic">{MARKETS[m].slice(0,2)}</span>{MARKETS[m].slice(2).trim()}<span className="c">{byMarket[m].length}</span></div>
            <div className="cards">
              {byMarket[m].map((r,i)=>(
                <div className="cardwrap" key={r.slug} style={{animationDelay:`${i*0.05}s`}}>
                  <ReportCard ticker={r.ticker} sector={r.sector} name={r.name} version={r.version} tone={r.tone}
                    oneLiner={r.one} badges={r.badges} metrics={r.metrics} href={r.href} />
                </div>
              ))}
            </div>
          </div>
        ))}

        <div className="footer">
          <span>AI 自动生成 · v4.6 动态联动 · 11 大师框架审计</span>
          <span><a href={GH} target="_blank" rel="noopener">GitHub</a> · <a href="https://github.com/leafpaper/claude-company-analysis" target="_blank" rel="noopener">分析 Skill</a></span>
        </div>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

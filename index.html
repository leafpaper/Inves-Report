      GitHub
    </a>
  </div>
</nav>

<!-- Hero + meme1 -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <div class="hero-badge">✦ 龟龟投资策略 v2 ✦</div>
      <h1>🐢 叶纸的投资分析报告</h1>
      <p>基于龟龟策略框架的定性分析与穿透回报率计算,覆盖美股二级市场及一级市场 VC/PE 投资机会。报告由 Claude Code company-analysis skill v4.6 自动生成。</p>
    </div>
    <div class="hero-meme">
      <img src="assets/meme1.jpg" alt="现在买,一定爆赚!">
      <span class="meme-caption">投资心态 ✓</span>
    </div>
  </div>
</div>

<!-- Stats(JS 动态填充) -->
<div class="stats-strip">
  <div class="stats-row" id="stats-row">
    <!-- render.js 会在这里注入 4 个 stat-cell -->
  </div>
</div>

<!-- v4.6 新增: 搜索 / 市场 tab / 排序 / 评分筛选 -->
<div class="toolbar">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="搜索 ticker / 公司名 / 业务描述..." autocomplete="off">
  </div>
  <div class="tab-group" role="tablist">
    <button class="tab-btn active" data-market="all">全部</button>
    <button class="tab-btn" data-market="us">📈 美股</button>
    <button class="tab-btn" data-market="a">🇨🇳 A股</button>
    <button class="tab-btn" data-market="hk">🇭🇰 港股</button>
    <button class="tab-btn" data-market="pe">🚀 一级</button>
  </div>
  <select class="sort-select" id="sort-select">
    <option value="date-desc">🕐 最新披露</option>
    <option value="date-asc">🕐 最早披露</option>
    <option value="score-desc">⭐ 评分高→低</option>
    <option value="score-asc">⭐ 评分低→高</option>
  </select>
  <select class="sort-select" id="min-score">
    <option value="0">全部评分</option>
    <option value="4">≥ 4.0 (可考虑)</option>
    <option value="6">≥ 6.0 (看好)</option>
    <option value="7.5">≥ 7.5 (强烈看好)</option>
  </select>
</div>

<div class="results-info" id="results-info">加载中...</div>

<!-- Reports(JS 动态渲染) -->
<div class="reports">
  <div id="reports-container">
    <!-- render.js 会在这里注入所有 section + cards -->
  </div>
</div>

<!-- Bottom meme banner -->
<div class="meme-banner">
  <div class="meme-banner-inner">
    <div class="meme-banner-img">
      <img src="assets/meme4.jpg" alt="在座里面只有我没有赚到钱">
    </div>
    <div class="meme-banner-text">
      <p class="big">「在座里面只有我没有赚到钱...」</p>
      <p>投资有风险,入市需谨慎。本站报告仅供参考,不构成投资建议。</p>
    </div>
    <div class="meme-banner-img">
      <img src="assets/meme4.jpg" alt="" style="transform:scaleX(-1)">
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-inner">
    <span>🐢 基于龟龟策略框架 · AI 自动生成 · v4.6 动态联动</span>
    <span>
      <a href="https://github.com/leafpaper/Inves-Report" target="_blank">GitHub</a> ·
      <a href="https://github.com/leafpaper/claude-company-analysis" target="_blank">分析 Skill</a>
    </span>
  </div>
</div>

<script src="./assets/js/render.js"></script>
</body>
</html>
